<!-- templates/profile_panel.html -->
<div id="profileContent" class="hidden">
    <div class="max-w-2xl rounded-3xl p-8 md:p-12 backdrop-blur-xl bg-white/5 border border-white/10">
        <!-- Profile Header -->
        <div class="flex flex-col md:flex-row items-center gap-8 mb-10">
            <div id="profileAvatar" class="w-24 h-24 rounded-3xl bg-gradient-to-br from-accent to-accent2 flex items-center justify-center text-4xl font-black text-primary shadow-2xl shadow-accent/20">
                —
            </div>
            <div class="text-center md:text-left">
                <h2 id="profileNameHeader" class="font-head font-bold text-3xl text-wdtext mb-1">—</h2>
                <p id="profileIdDisplay" class="text-accent2 font-bold tracking-widest text-xs uppercase">USER ID: —</p>
            </div>
        </div>

        <!-- Update Form -->
        <form id="profileUpdateForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-muted uppercase tracking-wider ml-1">Username</label>
                    <input type="text" id="inputUsername" class="w-full bg-primary/40 border border-white/10 rounded-xl px-4 py-4 text-sm focus:border-accent outline-none text-white transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-muted uppercase tracking-wider ml-1">Email Address</label>
                    <input type="email" id="inputEmail" class="w-full bg-primary/40 border border-white/10 rounded-xl px-4 py-4 text-sm focus:border-accent outline-none text-white transition-all" readonly>
                </div>
                <div class="space-y-1 md:col-span-2">
                    <label class="text-xs font-bold text-muted uppercase tracking-wider ml-1">Phone Number</label>
                    <input type="tel" id="inputPhone" class="w-full bg-primary/40 border border-white/10 rounded-xl px-4 py-4 text-sm focus:border-accent outline-none text-white transition-all" placeholder="Enter phone number">
                </div>
            </div>
            <button type="submit" class="w-full py-5 bg-accent text-primary font-head font-black uppercase tracking-widest rounded-2xl hover:brightness-110 active:scale-95 transition-all shadow-lg">
                Update Profile Details
            </button>
        </form>
    </div>
</div>
